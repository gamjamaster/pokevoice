<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéScan — Camera Pokémon Scanner</title>
    <link rel="stylesheet" href="scan-style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <nav class="top-nav">
          <a href="index.html" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            PokéVoice
          </a>
          <span class="nav-divider">/</span>
          <span class="nav-current">PokéScan</span>
        </nav>
        <h1>PokéScan</h1>
        <p class="subtitle">Point your camera at a Pokémon to identify it</p>
      </header>

      <main>
        <!-- Camera Section -->
        <section class="camera-section">
          <div class="camera-wrapper">
            <video id="camera" autoplay playsinline muted></video>
            <canvas id="snap-canvas" class="snap-canvas"></canvas>
            <div id="camera-placeholder" class="camera-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <p>Camera will appear here</p>
            </div>
            <div id="scanning-indicator" class="scanning-indicator hidden">
              <div class="scan-line"></div>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls">
            <button id="start-btn" class="btn-primary btn-large">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              Start Camera
            </button>
            <button id="snap-btn" class="btn-accent btn-large hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="4"/>
              </svg>
              Scan Now
            </button>
            <button id="stop-btn" class="btn-secondary btn-large hidden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
              Stop
            </button>
          </div>

          <!-- Prediction Bar -->
          <div id="prediction-bar" class="prediction-bar hidden">
            <div class="prediction-label">
              <span id="pred-name">—</span>
              <span id="pred-confidence"></span>
            </div>
            <div class="prediction-meter">
              <div id="pred-fill" class="prediction-fill"></div>
            </div>
          </div>
          <p id="scan-status" class="scan-status">Enter your Gemini API key to start scanning</p>
        </section>

        <!-- Result Section -->
        <section id="result" class="result hidden">
          <div class="card">
            <div class="card-header">
              <div class="pokemon-types" id="types"></div>
              <img id="pokemon-sprite" src="" alt="" />
              <h2 id="pokemon-name"></h2>
              <span id="pokemon-id" class="pokemon-id"></span>
            </div>

            <div class="card-body">
              <div class="matchup-section">
                <div class="matchup-group" id="matchup-weak"></div>
                <div class="matchup-group" id="matchup-resist"></div>
                <div class="matchup-group" id="matchup-immune"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- Error Section -->
        <section id="error-msg" class="error-msg hidden">
          <p id="error-text"></p>
        </section>
      </main>
    </div>

    <script src="scan.js"></script>
  </body>
</html>
